<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --bg:#0c1419; --bg2:#0f1b22; --surface:#142530; --line:#214050;
    --text:#e8f0f3; --muted:#90a7b3; --faint:#5e7884;
    --accent:#27d3b6; --caution:#f2b347; --warn:#ff6f6f; --info:#46b0dd;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  * { box-sizing:border-box; }
  body { width:330px; margin:0; background:var(--bg); color:var(--text);
         font-family:system-ui,-apple-system,"Malgun Gothic",sans-serif; font-size:13px; }
  .wrap { padding:16px; }
  .head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .brand { display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--faint); }
  .dot.safe { background:var(--accent); box-shadow:0 0 8px var(--accent); }
  .dot.caution { background:var(--caution); box-shadow:0 0 8px var(--caution); }
  .dot.danger { background:var(--warn); box-shadow:0 0 10px var(--warn); }
  .switch { position:relative; width:44px; height:24px; }
  .switch input { display:none; }
  .track { position:absolute; inset:0; border-radius:999px; background:var(--surface);
           border:1px solid var(--line); transition:.15s; cursor:pointer; }
  .track::after { content:''; position:absolute; top:2px; left:2px; width:18px; height:18px;
                  border-radius:50%; background:var(--faint); transition:.15s; }
  input:checked + .track { background:color-mix(in srgb, var(--accent) 25%, var(--surface)); border-color:var(--accent); }
  input:checked + .track::after { left:22px; background:var(--accent); }
  .status { background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:12px; }
  .statusTop { display:flex; justify-content:space-between; align-items:baseline; }
  .bandTxt { font-weight:700; }
  .score { font:700 20px var(--mono); }
  .meter { position:relative; height:7px; margin-top:8px; border-radius:5px; background:#091016;
           border:1px solid var(--line); overflow:hidden; }
  .fill { height:100%; width:0%; background:var(--accent); transition:width .3s, background .3s; }
  .sub { color:var(--faint); font-size:11.5px; margin-top:7px; }
  .row { display:flex; gap:8px; margin-bottom:10px; }
  select, button.act {
    flex:1; background:var(--surface); color:var(--text); border:1px solid var(--line);
    border-radius:9px; padding:8px; font-size:12.5px; cursor:pointer; font-family:inherit;
  }
  button.act:hover, select:hover { border-color:var(--accent); }
  label.lab { display:block; color:var(--faint); font-size:11px; margin-bottom:4px; letter-spacing:.06em; }
  .log { margin-top:6px; }
  .logTitle { color:var(--faint); font-size:11px; letter-spacing:.08em; margin-bottom:6px; }
  .ev { display:flex; justify-content:space-between; gap:8px; background:var(--bg2);
        border:1px solid var(--line); border-radius:8px; padding:7px 9px; margin-bottom:5px;
        font-size:11.5px; color:var(--muted); }
  .ev b { color:var(--warn); font-family:var(--mono); }
  .empty { color:var(--faint); font-size:11.5px; }
  .foot { margin-top:12px; padding-top:10px; border-top:1px solid var(--line);
          color:var(--faint); font-size:10.5px; line-height:1.5; }
  .foot a { color:var(--accent); text-decoration:none; cursor:pointer; }
  .err { background:color-mix(in srgb, var(--warn) 12%, transparent);
         border:1px solid color-mix(in srgb, var(--warn) 40%, transparent);
         color:#ffc9c9; border-radius:9px; padding:9px 11px; font-size:12px; margin-bottom:10px; display:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <span class="brand"><span id="dot" class="dot"></span>PeekGuard</span>
    <label class="switch"><input id="toggle" type="checkbox" /><span class="track"></span></label>
  </div>

  <div id="err" class="err"></div>

  <div class="status">
    <div class="statusTop">
      <span id="band" class="bandTxt" style="color:var(--faint)">꺼짐</span>
      <span class="score"><span id="score">–</span><small style="font:500 11px var(--mono);color:var(--faint)">/100</small></span>
    </div>
    <div class="meter"><div id="fill" class="fill"></div></div>
    <div id="sub" class="sub">감지를 켜면 실시간 판정이 표시됩니다</div>
  </div>

  <div class="row">
    <div style="flex:1">
      <label class="lab">민감도</label>
      <select id="sens" style="width:100%">
        <option value="low">둔감 (혼잡한 장소)</option>
        <option value="normal" selected>보통</option>
        <option value="high">민감 (금융 작업)</option>
      </select>
    </div>
    <div style="flex:1">
      <label class="lab">보호 방식</label>
      <select id="mode" style="width:100%">
        <option value="blur" selected>블러 + 근거 표시</option>
        <option value="decoy">디코이(위장 화면)</option>
      </select>
    </div>
  </div>

  <div class="row">
    <button id="pause" class="act">5분 일시정지</button>
    <button id="perm" class="act">카메라 권한 설정</button>
  </div>

  <div class="log">
    <div class="logTitle">최근 위협 이벤트 (기기 내 저장, 메타데이터만)</div>
    <div id="events"><span class="empty">아직 기록이 없습니다</span></div>
  </div>

  <div class="foot">
    영상은 어디에도 저장·전송되지 않습니다. 감지 결과의 시각·점수·신호 종류만 로컬에 남습니다.
    전면 카메라 화각 밖(정후방)은 감지할 수 없습니다.
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
