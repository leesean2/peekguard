<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; img-src 'self'" />
<title>PeekGuard overlay</title>
<style>
  :root {
    --accent:#27d3b6; --caution:#f2b347; --warn:#ff6f6f; --info:#46b0dd;
    --text:#e8f0f3; --muted:#90a7b3; --faint:#5e7884;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; font-family:var(--sans); }

  /* blur 모드: 창 배경을 투명하게 두면 Windows 11 아크릴이 실제 화면을 블러.
     미지원 OS 는 BrowserWindow backgroundColor(#0c1419)가 불투명하게 가린다. */
  body.blur { background:rgba(9,14,18,.45); color:var(--text); }
  .shield { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
  .badge { display:inline-flex; align-items:center; gap:9px; font:700 13px var(--mono); letter-spacing:.14em;
           text-transform:uppercase; color:var(--warn); background:rgba(12,20,25,.85);
           border:1px solid rgba(255,111,111,.5); border-radius:999px; padding:10px 18px; }
  .pulse { width:9px; height:9px; border-radius:50%; background:var(--warn); animation:pulse 1.1s infinite; }
  @keyframes pulse { 50% { opacity:.25; } }
  h1 { margin:0; font-size:22px; color:var(--text); text-shadow:0 1px 8px rgba(0,0,0,.6); }
  #signals { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:7px; max-width:520px; width:90%; }
  .sig { display:flex; gap:10px; align-items:flex-start; border-radius:10px; padding:10px 13px;
         background:rgba(12,20,25,.85); border:1px solid rgba(144,167,179,.25); font-size:13.5px; }
  .sigSev { flex:none; font:650 10px/1 var(--mono); border-radius:5px; padding:4px 6px; min-width:32px; text-align:center; }
  .hint { color:var(--muted); font-size:12.5px; background:rgba(12,20,25,.7); border-radius:8px; padding:7px 12px; }
  .hint b { color:var(--text); }
  .pauseBtn { appearance:none; cursor:pointer; font:650 13px var(--sans); color:var(--text);
              background:rgba(20,37,48,.9); border:1px solid rgba(144,167,179,.35);
              border-radius:10px; padding:10px 16px; }

  /* decoy 모드: 평범한 문서 화면 (확장 content.js 의 renderDecoy 와 동일 콘셉트) */
  body.decoy { background:#fff; color:#202124; overflow:hidden; }
  .doc { max-width:820px; margin:60px auto; padding:0 40px; }
  .doc .title { height:26px; width:56%; background:#e8eaed; border-radius:6px; margin-bottom:26px; }
  .doc .line { height:13px; background:#f1f3f4; border-radius:4px; margin-bottom:12px; }
  .dot { position:fixed; right:12px; bottom:12px; width:8px; height:8px; border-radius:50%; background:#dadce0; }
</style>
</head>
<body>
<script src="overlay.js"></script>
</body>
</html>
